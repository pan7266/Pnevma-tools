<!doctype html>
<html lang="el">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Pnevma · Product QA</title>
  <style>
    :root{--bg:#f4f0e9;--surface:#fffdf9;--surface-2:#e2d3c4;--ink:#231f20;--body:#514842;--muted:#766b63;--line:#cdbeaf;--accent:#db5927;--accent-hover:#e87542;--accent-soft:#fbede6;--done:#557d67;--warn:#b36c0e;--shadow:0 4px 16px rgba(54,38,29,.07);font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;color:var(--ink);background:var(--bg)}
    *{box-sizing:border-box}body{margin:0;font-size:13px;line-height:1.4;color:var(--body)}button,input,textarea,select{font:inherit;color:inherit}button{cursor:pointer}.app{max-width:1440px;margin:auto;padding:18px 22px 40px}.topbar{position:sticky;top:0;z-index:20;display:grid;grid-template-columns:minmax(240px,1fr) auto;gap:18px;align-items:center;margin:-8px -8px 14px;padding:8px;background:rgba(244,240,233,.97);border-bottom:1px solid rgba(205,190,175,.8);box-shadow:0 5px 14px rgba(54,38,29,.06);backdrop-filter:blur(8px)}.eyebrow{font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin-bottom:3px}h1{font-size:23px;letter-spacing:0;margin:0 0 2px;line-height:1.15;color:var(--ink)}.sub{color:var(--muted);font-size:12px}.actions{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}.btn{min-height:32px;padding:6px 10px;border:1px solid var(--line);border-radius:6px;background:var(--surface);font-weight:650;box-shadow:var(--shadow)}.btn:hover{border-color:var(--accent);color:var(--accent)}.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}.btn.primary:hover{background:var(--accent-hover);color:#fff}.btn.danger{color:#a6382f}.summary{display:grid;grid-template-columns:140px minmax(220px,1fr) repeat(3,100px);gap:10px;align-items:center;background:var(--surface);border:1px solid var(--line);border-radius:7px;padding:10px 12px;margin-bottom:10px;box-shadow:var(--shadow)}.progress-copy strong{font-size:20px;display:block;line-height:1;color:var(--ink)}.progress-copy span,.metric span{font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:750}.bar{height:7px;background:#eee6dd;border-radius:4px;overflow:hidden}.fill{height:100%;background:var(--accent);width:0;transition:width .2s}.metric{padding-left:12px;border-left:1px solid var(--line)}.metric strong{font-size:16px;display:block;color:var(--ink)}.filters{display:grid;grid-template-columns:minmax(220px,1fr) 220px auto;gap:8px;margin-bottom:10px}.field{height:34px;border:1px solid var(--line);border-radius:6px;background:var(--surface);padding:0 10px;outline:none}.field:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft)}.segmented{display:flex;border:1px solid var(--line);border-radius:6px;overflow:hidden;background:var(--surface)}.segmented button{border:0;border-right:1px solid var(--line);padding:0 10px;background:var(--surface);font-size:12px;font-weight:650}.segmented button:last-child{border-right:0}.segmented button.active{background:var(--accent-soft);color:#9e3d19}.legend{display:grid;grid-template-columns:minmax(180px,1.2fr) repeat(8,minmax(48px,.48fr)) minmax(150px,.8fr);gap:0;padding:0 10px 5px;color:var(--muted);font-size:9px;font-weight:800;text-transform:uppercase}.legend span:not(:first-child){text-align:center}.collection{background:var(--surface);border:1px solid var(--line);border-radius:7px;margin-bottom:7px;overflow:hidden;box-shadow:var(--shadow)}.collection[hidden]{display:none}.collection-head{display:grid;grid-template-columns:minmax(180px,1fr) auto auto;gap:12px;align-items:center;width:100%;border:0;background:#f8f3ed;padding:8px 10px;text-align:left;border-bottom:1px solid var(--line)}.collection-head:hover{background:#eee4da}.collection-title{font-weight:800;color:var(--ink)}.collection-meta{color:var(--muted);font-size:11px}.collection-percent{font-weight:800;color:var(--done);min-width:38px;text-align:right}.chevron{width:18px;height:18px;display:grid;place-items:center;color:var(--muted);transition:transform .15s}.collection.closed .chevron{transform:rotate(-90deg)}.rows{display:block}.collection.closed .rows{display:none}.row{display:grid;grid-template-columns:minmax(180px,1.2fr) repeat(8,minmax(48px,.48fr)) minmax(150px,.8fr);min-height:38px;border-bottom:1px solid #eee6dd;align-items:stretch}.row:last-child{border-bottom:0}.row[hidden]{display:none}.product{padding:7px 10px;display:flex;align-items:center;gap:8px;min-width:0}.product-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:650;color:var(--ink)}.product small{display:block;color:var(--muted)}.row.collection-page{background:#fbf7f2}.row.collection-page .product-name{color:#a6382f}.check-cell{display:grid;place-items:center;border-left:1px solid #eee6dd;position:relative}.check-cell input{appearance:none;width:18px;height:18px;border:1.5px solid var(--border,#cdbeaf);border-radius:4px;background:var(--surface);margin:0;cursor:pointer}.check-cell input:checked{background:var(--done);border-color:var(--done)}.check-cell input:checked:after{content:"";display:block;width:8px;height:4px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg);margin:4px 0 0 4px}.notes{border:0;border-left:1px solid #eee6dd;padding:7px 8px;resize:none;min-height:38px;background:transparent;outline:none;line-height:1.3}.notes:focus{background:#fbf1df;box-shadow:inset 2px 0 var(--accent)}.empty{padding:40px;text-align:center;color:var(--muted);display:none}.toast{position:fixed;right:18px;bottom:18px;background:var(--ink);color:#fff;padding:9px 12px;border-radius:6px;opacity:0;transform:translateY(8px);pointer-events:none;transition:.2s}.toast.show{opacity:1;transform:none}input[type=file]{display:none}
    @media(max-width:900px){.app{padding:12px}.topbar{grid-template-columns:minmax(150px,1fr) auto;margin:-6px -4px 12px;padding:6px}.topbar .sub{display:none}.actions{justify-content:flex-end;flex-wrap:nowrap;max-width:62vw;overflow-x:auto;padding-bottom:2px}.actions .btn{white-space:nowrap}.summary{grid-template-columns:100px 1fr repeat(3,70px)}.legend{display:none}.row{grid-template-columns:minmax(140px,1fr) repeat(8,36px) minmax(120px,.7fr)}.filters{grid-template-columns:1fr 180px}.segmented{grid-column:1/-1;height:34px}.check-cell input{width:17px;height:17px}}
    @media(max-width:640px){body{font-size:12px}.app{padding:10px 8px}.topbar{grid-template-columns:112px minmax(0,1fr);gap:6px}.eyebrow{display:none}h1{font-size:16px}.actions{max-width:none}.summary{grid-template-columns:90px 1fr}.metric{display:none}.filters{grid-template-columns:1fr}.row{grid-template-columns:repeat(8,minmax(0,1fr))}.product{grid-column:1/-1;padding:6px 8px;border-bottom:1px solid #eee6dd}.notes{grid-column:1/-1;border-left:0;border-top:1px solid #eee6dd;min-height:32px}.check-cell{min-height:36px}.collection-head{grid-template-columns:1fr auto}.collection-meta,.chevron{display:none}.actions .btn{font-size:10px;padding:5px 7px}.product-name{white-space:normal}}
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div><div class="eyebrow">Pnevma · e-shop</div><h1>Product QA checklist</h1><div class="sub">Έλεγχος συλλογών, προϊόντων και παραλλαγών · η πρόοδος αποθηκεύεται αυτόματα</div></div>
      <div class="actions">
        <button class="btn" id="expandAll">Άνοιγμα όλων</button><button class="btn" id="collapseAll">Κλείσιμο όλων</button>
        <label class="btn" for="importFile">Εισαγωγή JSON</label><input id="importFile" type="file" accept="application/json">
        <button class="btn primary" id="exportBtn">Εξαγωγή JSON</button><button class="btn danger" id="resetBtn">Μηδενισμός</button>
      </div>
    </header>
    <section class="summary" aria-label="Συνολική πρόοδος">
      <div class="progress-copy"><strong id="percent">0%</strong><span>Συνολική πρόοδος</span></div><div class="bar"><div class="fill" id="fill"></div></div>
      <div class="metric"><strong id="doneCount">0</strong><span>Ολοκληρωμένα</span></div><div class="metric"><strong id="openCount">0</strong><span>Σε εξέλιξη</span></div><div class="metric"><strong id="totalCount">0</strong><span>Σύνολο</span></div>
    </section>
    <section class="filters">
      <input class="field" id="search" type="search" placeholder="Αναζήτηση συλλογής ή προϊόντος…">
      <select class="field" id="collectionFilter"><option value="">Όλες οι συλλογές</option></select>
      <div class="segmented" id="statusFilter"><button class="active" data-status="all">Όλα</button><button data-status="open">Ανοιχτά</button><button data-status="done">Έτοιμα</button><button data-status="notes">Με σημείωση</button></div>
    </section>
    <div class="legend" id="legend"><span>Προϊόν / σελίδα</span></div>
    <section id="collections"></section><div class="empty" id="empty">Δεν βρέθηκαν αποτελέσματα.</div>
  </main><div class="toast" id="toast">Αποθηκεύτηκε</div>
  <script src="pnevma-product-qa-data.js"></script>
  <script>
  (()=>{
    const ITEMS=(window.QA_EXPORT&&window.QA_EXPORT.checklistItems)||["Σπάσιμο τίτλου;","Υπάρχει τιμή;","Η περιγραφή ταιριάζει με το προϊόν;","Η παραλλαγή περιγράφεται σωστά;","Ορθογραφία;","Φωτογραφίες ανά παραλλαγή;","Πρόσθετες πληροφορίες;","Υπάρχει βάρος;"];
    const EXTRA=[
      ["Velo",["Το φιλί","Διαυγές Πρόσωπο","Κοσμικό Ζευγάρι","Ανθισμένο Ζευγάρι","Μυστικό φιλί","Μέδουσα","Shadow","Nightwalking","Alter Ego","Dreamy"]],
      ["Αέναος Οίκος",["Οίκος Ευτυχίας","Οίκος Καρδιάς","Λευκή Πύλη","Έτος Ευχής"]],
      ["Aurelia Prime",["Εστία","Αφηρμένο ρόδι","Ρόδι","Συγχρονο μάτι","Τύχη","Μάτι","Υγεία","2027"]],
      ["Zen Needles",["Tree 01","Tree 02","Tree 03","Dwarf 01","Dwarf 02","Nutcracker 01","Nutcracker 02"]],
      ["Spectrum Rings",["SR-01","SR-02","SR-03","SR-04","SR-05","SR-06","SR-07","SR-10","SR-11","SR-12","SR-13","SR-14","SR-20","SR-21","SR-22"]],
      ["Natural Lux",["Δέντρο","Αστέρι","Τριαντάφυλλο","Οικία","Ρόδι"]],
      ["Bau Line Home",["Green01","Green02","Blue 01","Blue02","Gold01","Gold02","Gold03"]],
      ["Bau Line Pom",["Green01","Green02","Blue 01","Blue02","Gold01","Gold02","Gold03","Gold4"]],
      ["Bau Line Tree",["Green01","Green02","Blue 01","Blue02"]],
      ["Art Echoes",["Ρόδι 01","Ρόδι 02","Ρόδι 03","Ρόδι 04","Σπίτι 01","Σπίτι 02","Σπίτι 03","Σπίτι 04","Σπίτι 05"]],
      ["Light Echoes",["item1","item2","item3","item4"]]
    ];
    const NEW_IDS={"Velo":"velo","Αέναος Οίκος":"aenaos-oikos","Aurelia Prime":"aurelia-prime","Zen Needles":"zen-needles","Spectrum Rings":"spectrum-rings","Natural Lux":"natural-lux","Bau Line Home":"bau-line-home","Bau Line Pom":"bau-line-pom","Bau Line Tree":"bau-line-tree","Art Echoes":"art-echoes","Light Echoes":"light-echoes"};
    const productIds={"Το φιλί":"to-fili","Διαυγές Πρόσωπο":"diavges-prosopo","Κοσμικό Ζευγάρι":"kosmiko-zevgari","Ανθισμένο Ζευγάρι":"anthismeno-zevgari","Μυστικό φιλί":"mystiko-fili","Μέδουσα":"medousa","Οίκος Ευτυχίας":"oikos-eftychias","Οίκος Καρδιάς":"oikos-kardias","Λευκή Πύλη":"lefki-pyli","Έτος Ευχής":"etos-efchis","Εστία":"estia","Αφηρμένο ρόδι":"afirimeno-rodi","Ρόδι":"rodi","Συγχρονο μάτι":"sygchrono-mati","Τύχη":"tychi","Μάτι":"mati","Υγεία":"ygeia","Δέντρο":"dentro","Αστέρι":"asteri","Τριαντάφυλλο":"triantafyllo","Οικία":"oikia","Ρόδι 01":"rodi-01","Ρόδι 02":"rodi-02","Ρόδι 03":"rodi-03","Ρόδι 04":"rodi-04","Σπίτι 01":"spiti-01","Σπίτι 02":"spiti-02","Σπίτι 03":"spiti-03","Σπίτι 04":"spiti-04","Σπίτι 05":"spiti-05"};
    const clean=s=>s.toLowerCase().replace(/\s+/g,"-");
    const labels={"libilis-domus":"Libilis Domus","libilis-nautica":"Libilis Nautica","nobilis-nautica":"Nobilis Nautica","nobilis-domus":"Nobilis Domus","boreal":"Boreal","celestial-fusion":"Celestial Fusion","noir-fusion":"Noir Fusion","white-mystique":"White Mystique","bronze-eclipse":"Bronze Eclipse","teak-elegance":"Teak Elegance","grey-sphere":"Grey Sphere"};
    const state=structuredClone((window.QA_EXPORT&&window.QA_EXPORT.state)||{}), storageKey="pnevma-product-qa-v2";
    EXTRA.forEach(([name,products])=>{const base=NEW_IDS[name],cid="collection-"+base;state[cid]??={checks:Array(8).fill(false),notes:""};products.forEach(name=>{const id=base+"-"+(productIds[name]||clean(name));state[id]??={checks:Array(8).fill(false),notes:""}})});
    try{const saved=JSON.parse(localStorage.getItem(storageKey));if(saved&&saved.state)Object.assign(state,saved.state)}catch(e){}
    const groups=[];let current={id:"libilis-domus",name:"Libilis Domus",rows:[]};groups.push(current);
    Object.keys(state).forEach(id=>{if(id.startsWith("collection-")){const base=id.slice(11);current={id:base,name:labels[base]||EXTRA.find(x=>NEW_IDS[x[0]]===base)?.[0]||title(base),rows:[]};groups.push(current);current.rows.push({id,name:"Σελίδα συλλογής",collection:true})}else{current.rows.push({id,name:displayName(id,current.id)})}});
    function title(s){return s.split("-").map(x=>/^\d+$/.test(x)||x.toUpperCase().startsWith("SR")?x:x.charAt(0).toUpperCase()+x.slice(1)).join(" ")}
    function displayName(id,base){const extra=EXTRA.find(x=>NEW_IDS[x[0]]===base);if(extra){const ix=extra[1].find(name=>base+"-"+(productIds[name]||clean(name))===id);if(ix)return ix}return title(id.startsWith(base+"-")?id.slice(base.length+1):id)}
    const root=document.getElementById("collections"), legend=document.getElementById("legend");ITEMS.forEach((x,i)=>{const s=document.createElement("span");s.textContent=(i+1)+". "+x.replace(";","");s.title=x;legend.appendChild(s)});const ns=document.createElement("span");ns.textContent="Σημειώσεις";legend.appendChild(ns);
    groups.filter(g=>g.rows.length).forEach(group=>{const el=document.createElement("article");el.className="collection";el.dataset.group=group.id;el.innerHTML=`<button class="collection-head" type="button"><span><span class="collection-title">${group.name}</span> <span class="collection-meta"></span></span><span class="collection-percent">0%</span><span class="chevron">⌄</span></button><div class="rows"></div>`;const body=el.querySelector(".rows");group.rows.forEach(row=>{const data=state[row.id]||{checks:Array(8).fill(false),notes:""},r=document.createElement("div");r.className="row"+(row.collection?" collection-page":"");r.dataset.id=row.id;r.dataset.name=(group.name+" "+row.name).toLowerCase();r.innerHTML=`<div class="product"><span class="product-name" title="${row.name}">${row.name}</span></div>${ITEMS.map((item,i)=>`<label class="check-cell" title="${item}"><input type="checkbox" data-check="${i}" ${data.checks[i]?"checked":""} aria-label="${row.name}: ${item}"></label>`).join("")}<textarea class="notes" rows="1" placeholder="Σημείωση…" aria-label="Σημειώσεις για ${row.name}">${data.notes||""}</textarea>`;body.appendChild(r)});root.appendChild(el);el.querySelector(".collection-head").onclick=()=>el.classList.toggle("closed")});
    const collectionFilter=document.getElementById("collectionFilter");groups.filter(g=>g.rows.length).forEach(g=>collectionFilter.add(new Option(g.name,g.id)));
    let status="all",saveTimer;root.addEventListener("input",e=>{const row=e.target.closest(".row");if(!row)return;const d=state[row.dataset.id];if(e.target.matches("input"))d.checks[+e.target.dataset.check]=e.target.checked;else if(e.target.matches("textarea"))d.notes=e.target.value;scheduleSave();update()});
    root.addEventListener("change",e=>{if(e.target.matches("input"))applyFilters()});
    function scheduleSave(){clearTimeout(saveTimer);saveTimer=setTimeout(()=>{localStorage.setItem(storageKey,JSON.stringify({state}));toast("Αποθηκεύτηκε")},250)}
    function complete(d){return d.checks.every(Boolean)} function started(d){return d.checks.some(Boolean)&&!complete(d)}
    function update(){let done=0,open=0,total=0;document.querySelectorAll(".collection").forEach(c=>{const rows=[...c.querySelectorAll(".row")],ds=rows.map(r=>state[r.dataset.id]);const cd=ds.filter(complete).length;total+=ds.length;done+=cd;open+=ds.filter(started).length;c.querySelector(".collection-meta").textContent=`${cd} / ${ds.length} ολοκληρωμένα`;c.querySelector(".collection-percent").textContent=Math.round(cd/ds.length*100)+"%"});const pct=total?Math.round(done/total*100):0;document.getElementById("percent").textContent=pct+"%";document.getElementById("fill").style.width=pct+"%";document.getElementById("doneCount").textContent=done;document.getElementById("openCount").textContent=open;document.getElementById("totalCount").textContent=total}
    function applyFilters(){const q=document.getElementById("search").value.trim().toLowerCase(),group=collectionFilter.value;let visible=0;document.querySelectorAll(".collection").forEach(c=>{let n=0;c.querySelectorAll(".row").forEach(r=>{const d=state[r.dataset.id],matchStatus=status==="all"||(status==="done"&&complete(d))||(status==="open"&&!complete(d))||(status==="notes"&&d.notes.trim()),show=(!q||r.dataset.name.includes(q))&&matchStatus;r.hidden=!show;if(show)n++});c.hidden=(group&&c.dataset.group!==group)||n===0;if(!c.hidden)visible++});document.getElementById("empty").style.display=visible?"none":"block"}
    document.getElementById("search").oninput=applyFilters;collectionFilter.onchange=applyFilters;document.getElementById("statusFilter").onclick=e=>{if(!e.target.dataset.status)return;status=e.target.dataset.status;document.querySelectorAll("#statusFilter button").forEach(b=>b.classList.toggle("active",b===e.target));applyFilters()};
    document.getElementById("expandAll").onclick=()=>document.querySelectorAll(".collection").forEach(x=>x.classList.remove("closed"));document.getElementById("collapseAll").onclick=()=>document.querySelectorAll(".collection").forEach(x=>x.classList.add("closed"));
    document.getElementById("resetBtn").onclick=()=>{if(!confirm("Να μηδενιστούν όλοι οι έλεγχοι και οι σημειώσεις;"))return;Object.values(state).forEach(d=>{d.checks.fill(false);d.notes=""});localStorage.removeItem(storageKey);location.reload()};
    document.getElementById("exportBtn").onclick=()=>{const data={schema:"pnevma-product-qa-checklist",version:2,exportedAt:new Date().toISOString(),totalProducts:Object.keys(state).length,checklistItems:ITEMS,state};const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:"application/json"}));a.download=`pnevma-product-qa-checklist-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(a.href);toast("Το JSON δημιουργήθηκε")};
    document.getElementById("importFile").onchange=async e=>{try{const data=JSON.parse(await e.target.files[0].text());if(!data.state)throw Error();Object.entries(data.state).forEach(([id,d])=>{if(state[id])state[id]={checks:ITEMS.map((_,i)=>Boolean(d.checks?.[i])),notes:d.notes||""}});localStorage.setItem(storageKey,JSON.stringify({state}));location.reload()}catch(err){alert("Το αρχείο JSON δεν είναι έγκυρο.")}};
    function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1400)}update();applyFilters();
  })();
  </script>
</body>
</html>
