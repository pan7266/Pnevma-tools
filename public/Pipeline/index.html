    const passphraseInput=document.getElementById('passphrase');const unlockButton=document.getElementById('unlock');const clearButton=document.getElementById('clear');const statusText=document.getElementById('status');const decoder=new TextDecoder();const encoder=new TextEncoder();
    function setStatus(message,type){statusText.textContent=message;statusText.className=type?'status '+type:'status'}
    function fromBase64(value){const binary=atob(value);const bytes=new Uint8Array(binary.length);for(let index=0;index<binary.length;index+=1)bytes[index]=binary.charCodeAt(index);return bytes}
    async function deriveKey(passphrase,salt,iterations){const baseKey=await crypto.subtle.importKey('raw',encoder.encode(passphrase),'PBKDF2',false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations,hash:'SHA-256'},baseKey,{name:'AES-GCM',length:256},false,['decrypt'])}
    async function decryptPage(passphrase){const key=await deriveKey(passphrase,fromBase64(PAGE.salt),PAGE.iterations);const plaintext=await crypto.subtle.decrypt({name:'AES-GCM',iv:fromBase64(PAGE.iv)},key,fromBase64(PAGE.ciphertext));return decoder.decode(plaintext)}
    async function unlock(){const passphrase=passphraseInput.value;if(!window.crypto||!crypto.subtle){setStatus('WebCrypto is unavailable. Open this page over HTTPS or localhost.','error');return}if(!passphrase){setStatus('Enter the passphrase first.','error');passphraseInput.focus();return}unlockButton.disabled=true;setStatus('Decrypting pipeline tracker...',null);try{const html=await decryptPage(passphrase);passphraseInput.value='';document.open();document.write(html);document.close()}catch(error){setStatus('Could not decrypt. Check the passphrase.','error')}finally{unlockButton.disabled=false}}
    passphraseInput.addEventListener('keydown',(event)=>{if(event.key==='Enter')unlock()});unlockButton.addEventListener('click',unlock);clearButton.addEventListener('click',()=>{passphraseInput.value='';setStatus('Cleared. Enter the passphrase to unlock the pipeline tracker.',null);passphraseInput.focus()});passphraseInput.focus();
