<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <title>Protected Pnevma HTML</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f1ea;
      --panel: #fffaf4;
      --ink: #231f20;
      --muted: #6d635b;
      --line: #d3c3b5;
      --accent: #db5927;
      --accent-dark: #b84319;
      --ok: #25663d;
      --error: #9f281f;
    }

    * {
      box-sizing: border-box;
    }

    [hidden] {
      display: none !important;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.45;
    }

    .shell {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0;
      display: grid;
      gap: 16px;
    }

    .toolbar {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 8px;
      box-shadow: 0 18px 50px rgba(35, 31, 32, 0.08);
    }

    .toolbar {
      padding: 16px;
      display: grid;
      gap: 10px;
    }

    .heading {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.15;
    }

    .meta {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .fields {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) auto auto;
      align-items: end;
      gap: 12px;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    select,
    input,
    button {
      min-height: 42px;
      border-radius: 6px;
      font: inherit;
    }

    select,
    input {
      width: 100%;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      padding: 0 12px;
    }

    button {
      border: 1px solid transparent;
      padding: 0 16px;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .primary {
      background: var(--accent);
      color: #fff;
    }

    .primary:hover:not(:disabled) {
      background: var(--accent-dark);
    }

    .secondary {
      background: #fff;
      color: var(--ink);
      border-color: var(--line);
    }

    .page-menu {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
    }

    .page-tab {
      min-height: 32px;
      border-color: var(--line);
      background: #fff;
      color: var(--ink);
      padding: 0 12px;
      font-size: 13px;
    }

    .page-tab.active {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .page-tab.lock-tab {
      margin-left: 6px;
      border-color: transparent;
      background: transparent;
      color: var(--muted);
      padding: 0 10px;
    }

    .page-tab.lock-tab:hover {
      border-color: var(--line);
      background: #fff;
      color: var(--ink);
    }

    .status {
      min-height: 20px;
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .status.ok {
      color: var(--ok);
    }

    .status.error {
      color: var(--error);
    }

    .viewer {
      width: 100%;
      min-height: 68vh;
      overflow: visible;
      background: #fff;
    }

    body.is-unlocked {
      background: #fff;
    }

    body.is-unlocked .shell {
      width: min(1180px, calc(100vw - 32px));
      padding-bottom: 12px;
    }

    iframe {
      display: block;
      width: 100%;
      min-height: calc(100vh - 130px);
      border: 0;
      background: #fff;
    }

    .empty {
      min-height: 68vh;
      display: grid;
      place-items: center;
      color: var(--muted);
      text-align: center;
      padding: 24px;
    }

    @media (max-width: 860px) {
      .fields {
        grid-template-columns: 1fr;
      }

      .heading {
        display: grid;
      }

      .page-menu {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="toolbar" aria-label="Protected page controls">
      <div class="heading">
        <div>
          <h1>Protected Pnevma HTML</h1>
          <p class="meta">Encrypted static pages. The passphrase is not stored in this file.</p>
        </div>
        <nav class="page-menu" id="pageMenu" aria-label="Unlocked page menu" hidden></nav>
      </div>
      <p class="meta" id="pageMeta"></p>

      <div class="fields" id="unlockForm">
        <label for="passphrase">Passphrase
          <input id="passphrase" type="password" autocomplete="current-password" spellcheck="false">
        </label>
        <button class="primary" id="unlock" type="button">Unlock</button>
        <button class="secondary" id="clear" type="button">Clear</button>
      </div>
      <p class="status" id="status" role="status" aria-live="polite">Enter the passphrase to unlock both pages.</p>
    </section>

  </main>

  <div class="viewer" id="viewer" aria-label="Decrypted page preview" hidden>
    <div class="empty" id="emptyState" hidden>No page unlocked.</div>
    <iframe id="preview" title="Decrypted protected HTML preview" sandbox="allow-downloads allow-forms allow-modals allow-popups allow-scripts" hidden></iframe>
  </div>

    const pageMenu = document.getElementById('pageMenu');
    const unlockForm = document.getElementById('unlockForm');
    const passphraseInput = document.getElementById('passphrase');
    const unlockButton = document.getElementById('unlock');
    const clearButton = document.getElementById('clear');
    const statusText = document.getElementById('status');
    const pageMeta = document.getElementById('pageMeta');
    const viewer = document.getElementById('viewer');
    const preview = document.getElementById('preview');
    const emptyState = document.getElementById('emptyState');
    const decryptedPages = new Map();
    let activePageId = PROTECTED_PAGES[0] ? PROTECTED_PAGES[0].id : '';

    function setStatus(message, type) {
      statusText.textContent = message;
      statusText.className = type ? 'status ' + type : 'status';
    }

    function fromBase64(value) {
      const binary = atob(value);
      const bytes = new Uint8Array(binary.length);
      for (let index = 0; index < binary.length; index += 1) {
        bytes[index] = binary.charCodeAt(index);
      }
      return bytes;
    }

    async function deriveKey(passphrase, salt, iterations) {
      const material = await crypto.subtle.importKey(
        'raw',
        new TextEncoder().encode(passphrase),
        'PBKDF2',
        false,
        ['deriveKey']
      );

      return crypto.subtle.deriveKey(
        {
          name: 'PBKDF2',
          salt,
          iterations,
          hash: 'SHA-256',
        },
        material,
        {
          name: 'AES-GCM',
          length: 256,
        },
        false,
        ['decrypt']
      );
    }

    async function decryptPage(page, passphrase) {
      const salt = fromBase64(page.salt);
      const iv = fromBase64(page.iv);
      const ciphertext = fromBase64(page.ciphertext);
      const key = await deriveKey(passphrase, salt, page.iterations);
      const plaintext = await crypto.subtle.decrypt(
        {
          name: 'AES-GCM',
          iv,
        },
        key,
        ciphertext
      );

      return new TextDecoder().decode(plaintext);
    }

    function selectedPage() {
      return PROTECTED_PAGES.find((page) => page.id === activePageId) || PROTECTED_PAGES[0];
    }

    function updatePageMeta() {
      const page = selectedPage();
      if (decryptedPages.size === 0) {
        const totalBytes = PROTECTED_PAGES.reduce((sum, item) => sum + item.bytes, 0);
        pageMeta.textContent = PROTECTED_PAGES.length + ' pages | ' + Math.round(totalBytes / 1024) + ' KB encrypted';
        return;
      }

      pageMeta.textContent = page ? page.originalFilename : '';
    }

    function updateActiveTab() {
      pageMenu.querySelectorAll('[data-page-id]').forEach((button) => {
        const isActive = button.dataset.pageId === activePageId;
        button.classList.toggle('active', isActive);
        button.setAttribute('aria-current', isActive ? 'page' : 'false');
      });
    }

    function showPage(pageId) {
      if (!decryptedPages.has(pageId)) {
        return;
      }

      const page = PROTECTED_PAGES.find((item) => item.id === pageId);
      activePageId = pageId;
      preview.srcdoc = decryptedPages.get(pageId);
      preview.title = page ? page.label : 'Decrypted protected HTML preview';
      document.body.classList.add('is-unlocked');
      viewer.hidden = false;
      emptyState.hidden = true;
      preview.hidden = false;
      updateActiveTab();
      updatePageMeta();
    }

    function renderPageMenu() {
      pageMenu.replaceChildren();
      PROTECTED_PAGES.forEach((page) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'page-tab';
        button.dataset.pageId = page.id;
        button.textContent = page.label;
        button.addEventListener('click', (event) => {
          event.preventDefault();
          event.stopPropagation();
          showPage(page.id);
        });
        pageMenu.append(button);
      });
      const lockButton = document.createElement('button');
      lockButton.type = 'button';
      lockButton.className = 'page-tab lock-tab';
      lockButton.textContent = 'Lock pages';
      lockButton.addEventListener('click', (event) => {
        event.preventDefault();
        event.stopPropagation();
        resetPreview();
        setStatus('Locked. Enter the passphrase to unlock both pages.', null);
        passphraseInput.focus();
      });
      pageMenu.append(lockButton);
      pageMenu.hidden = false;
      updateActiveTab();
    }

    function resetPreview() {
      decryptedPages.clear();
      activePageId = PROTECTED_PAGES[0] ? PROTECTED_PAGES[0].id : '';
      document.body.classList.remove('is-unlocked');
      viewer.hidden = true;
      preview.hidden = true;
      preview.removeAttribute('srcdoc');
      emptyState.hidden = false;
      pageMenu.hidden = true;
      pageMenu.replaceChildren();
      unlockForm.hidden = false;
      pageMeta.hidden = false;
      statusText.hidden = false;
      updatePageMeta();
    }

    async function unlock() {
      const passphrase = passphraseInput.value;

      if (!crypto.subtle) {
        setStatus('WebCrypto is unavailable. Open this page over HTTPS or localhost.', 'error');
        return;
      }

      if (!passphrase) {
        setStatus('Enter the passphrase first.', 'error');
        passphraseInput.focus();
        return;
      }

      unlockButton.disabled = true;
      setStatus('Decrypting both pages...', null);

      try {
        const unlockedPages = await Promise.all(
          PROTECTED_PAGES.map(async (page) => [page.id, await decryptPage(page, passphrase)])
        );
        decryptedPages.clear();
        unlockedPages.forEach(([pageId, html]) => decryptedPages.set(pageId, html));
        passphraseInput.value = '';
        unlockForm.hidden = true;
        renderPageMenu();
        showPage(activePageId);
        setStatus('Unlocked both pages.', 'ok');
        pageMeta.hidden = true;
        statusText.hidden = true;
      } catch (error) {
        resetPreview();
        setStatus('Could not decrypt. Check the passphrase.', 'error');
      } finally {
        unlockButton.disabled = false;
      }
    }

    passphraseInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        unlock();
      }
    });

    unlockButton.addEventListener('click', unlock);
    clearButton.addEventListener('click', () => {
      passphraseInput.value = '';
      resetPreview();
      setStatus('Cleared. Enter the passphrase to unlock both pages.', null);
      passphraseInput.focus();
    });

    updatePageMeta();
  </script>
