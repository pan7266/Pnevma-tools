<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <title>Protected Pnevma HTML</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f1ea;
      --panel: #fffaf4;
      --ink: #231f20;
      --muted: #6d635b;
      --line: #d3c3b5;
      --accent: #db5927;
      --accent-dark: #b84319;
      --ok: #25663d;
      --error: #9f281f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.45;
    }

    .shell {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0;
      display: grid;
      gap: 16px;
    }

    .toolbar,
    .viewer {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 8px;
      box-shadow: 0 18px 50px rgba(35, 31, 32, 0.08);
    }

    .toolbar {
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    .heading {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.15;
    }

    .meta {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .fields {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) minmax(260px, 2fr) auto auto;
      align-items: end;
      gap: 12px;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    select,
    input,
    button {
      min-height: 42px;
      border-radius: 6px;
      font: inherit;
    }

    select,
    input {
      width: 100%;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      padding: 0 12px;
    }

    button {
      border: 1px solid transparent;
      padding: 0 16px;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .primary {
      background: var(--accent);
      color: #fff;
    }

    .primary:hover:not(:disabled) {
      background: var(--accent-dark);
    }

    .secondary {
      background: #fff;
      color: var(--ink);
      border-color: var(--line);
    }

    .status {
      min-height: 20px;
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .status.ok {
      color: var(--ok);
    }

    .status.error {
      color: var(--error);
    }

    .viewer {
      min-height: 68vh;
      overflow: hidden;
    }

    iframe {
      display: block;
      width: 100%;
      min-height: 68vh;
      border: 0;
      background: #fff;
    }

    .empty {
      min-height: 68vh;
      display: grid;
      place-items: center;
      color: var(--muted);
      text-align: center;
      padding: 24px;
    }

    @media (max-width: 860px) {
      .fields {
        grid-template-columns: 1fr;
      }

      .heading {
        display: block;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="toolbar" aria-label="Protected page controls">
      <div class="heading">
        <div>
          <h1>Protected Pnevma HTML</h1>
          <p class="meta">Encrypted static pages. The passphrase is not stored in this file.</p>
        </div>
        <p class="meta" id="pageMeta"></p>
      </div>

      <div class="fields">
        <label for="pageSelect">Page
          <select id="pageSelect"></select>
        </label>
        <label for="passphrase">Passphrase
          <input id="passphrase" type="password" autocomplete="current-password" spellcheck="false">
        </label>
        <button class="primary" id="unlock" type="button">Unlock</button>
        <button class="secondary" id="clear" type="button">Clear</button>
      </div>
      <p class="status" id="status" role="status" aria-live="polite">Choose a page and enter the passphrase.</p>
    </section>

    <section class="viewer" aria-label="Decrypted page preview">
      <div class="empty" id="emptyState">No page unlocked.</div>
      <iframe id="preview" title="Decrypted protected HTML preview" sandbox="allow-downloads allow-forms allow-modals allow-popups allow-scripts" hidden></iframe>
    </section>
  </main>

    const pageSelect = document.getElementById('pageSelect');
    const passphraseInput = document.getElementById('passphrase');
    const unlockButton = document.getElementById('unlock');
    const clearButton = document.getElementById('clear');
    const statusText = document.getElementById('status');
    const pageMeta = document.getElementById('pageMeta');
    const preview = document.getElementById('preview');
    const emptyState = document.getElementById('emptyState');

    function setStatus(message, type) {
      statusText.textContent = message;
      statusText.className = type ? 'status ' + type : 'status';
    }

    function fromBase64(value) {
      const binary = atob(value);
      const bytes = new Uint8Array(binary.length);
      for (let index = 0; index < binary.length; index += 1) {
        bytes[index] = binary.charCodeAt(index);
      }
      return bytes;
    }

    async function deriveKey(passphrase, salt, iterations) {
      const material = await crypto.subtle.importKey(
        'raw',
        new TextEncoder().encode(passphrase),
        'PBKDF2',
        false,
        ['deriveKey']
      );

      return crypto.subtle.deriveKey(
        {
          name: 'PBKDF2',
          salt,
          iterations,
          hash: 'SHA-256',
        },
        material,
        {
          name: 'AES-GCM',
          length: 256,
        },
        false,
        ['decrypt']
      );
    }

    async function decryptPage(page, passphrase) {
      const salt = fromBase64(page.salt);
      const iv = fromBase64(page.iv);
      const ciphertext = fromBase64(page.ciphertext);
      const key = await deriveKey(passphrase, salt, page.iterations);
      const plaintext = await crypto.subtle.decrypt(
        {
          name: 'AES-GCM',
          iv,
        },
        key,
        ciphertext
      );

      return new TextDecoder().decode(plaintext);
    }

    function selectedPage() {
      return PROTECTED_PAGES.find((page) => page.id === pageSelect.value) || PROTECTED_PAGES[0];
    }

    function updatePageMeta() {
      const page = selectedPage();
      pageMeta.textContent = page ? page.originalFilename + ' | ' + Math.round(page.bytes / 1024) + ' KB encrypted' : '';
    }

    function resetPreview() {
      preview.hidden = true;
      preview.removeAttribute('srcdoc');
      emptyState.hidden = false;
    }

    async function unlock() {
      const passphrase = passphraseInput.value;
      const page = selectedPage();

      if (!crypto.subtle) {
        setStatus('WebCrypto is unavailable. Open this page over HTTPS or localhost.', 'error');
        return;
      }

      if (!passphrase) {
        setStatus('Enter the passphrase first.', 'error');
        passphraseInput.focus();
        return;
      }

      unlockButton.disabled = true;
      setStatus('Decrypting...', null);

      try {
        const html = await decryptPage(page, passphrase);
        preview.srcdoc = html;
        emptyState.hidden = true;
        preview.hidden = false;
        setStatus('Unlocked: ' + page.label, 'ok');
      } catch (error) {
        resetPreview();
        setStatus('Could not decrypt. Check the selected page and passphrase.', 'error');
      } finally {
        unlockButton.disabled = false;
      }
    }

    PROTECTED_PAGES.forEach((page) => {
      const option = document.createElement('option');
      option.value = page.id;
      option.textContent = page.label;
      pageSelect.append(option);
    });

    pageSelect.addEventListener('change', () => {
      updatePageMeta();
      resetPreview();
      setStatus('Choose a page and enter the passphrase.', null);
    });

    passphraseInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        unlock();
      }
    });

    unlockButton.addEventListener('click', unlock);
    clearButton.addEventListener('click', () => {
      passphraseInput.value = '';
      resetPreview();
      setStatus('Cleared.', null);
      passphraseInput.focus();
    });

    updatePageMeta();
  </script>
