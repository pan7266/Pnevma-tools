<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <title>Pnevma Craft Access</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f1ea;
      --panel: #fffaf4;
      --ink: #17201c;
      --muted: #5f6a64;
      --line: #dccfc1;
      --accent: #d95b2b;
      --accent-strong: #b83e19;
      --ok: #057a55;
      --danger: #b42318;
      --shadow: 0 18px 48px rgba(52, 42, 32, 0.14);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      background: radial-gradient(circle at top left, rgba(217, 91, 43, 0.12), transparent 34rem), var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
    }
    .shell { min-height: 100vh; padding: 24px; display: grid; grid-template-rows: auto 1fr; gap: 16px; }
    .gate {
      width: min(900px, 100%);
      margin: 0 auto;
      background: color-mix(in srgb, var(--panel) 94%, white);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      border-radius: 8px;
      padding: 20px;
    }
    .heading { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 16px; }
    h1 { margin: 0 0 4px; font-size: 20px; letter-spacing: 0; line-height: 1.2; }
    .meta, .status { color: var(--muted); margin: 0; line-height: 1.45; }
    .badge { border: 1px solid var(--line); border-radius: 999px; padding: 6px 10px; color: var(--muted); white-space: nowrap; font-size: 12px; }
    .fields { display: grid; grid-template-columns: 1fr auto auto; gap: 10px; align-items: end; }
    label { display: grid; gap: 6px; color: var(--muted); font-size: 11px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; }
    input {
      width: 100%;
      height: 40px;
      border: 1px solid #cbbdad;
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      padding: 0 12px;
      font: inherit;
    }
    input:focus { outline: 2px solid rgba(217, 91, 43, .28); border-color: var(--accent); }
    button {
      height: 40px;
      border-radius: 6px;
      border: 1px solid transparent;
      padding: 0 16px;
      font-weight: 800;
      cursor: pointer;
      font: inherit;
    }
    button.primary { background: var(--accent); color: #fff; }
    button.primary:hover { background: var(--accent-strong); }
    button.secondary { background: #fff; border-color: #cbbdad; color: var(--ink); }
    button:disabled { opacity: .6; cursor: wait; }
    .status { min-height: 22px; margin-top: 12px; }
    .status.ok { color: var(--ok); }
    .status.error { color: var(--danger); }
    .viewer {
      width: min(1380px, 100%);
      min-height: calc(100vh - 156px);
      margin: 0 auto;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    iframe { width: 100%; min-height: calc(100vh - 158px); border: 0; display: block; background: #fff; }
    body.is-unlocked .gate { display: none; }
    body:not(.is-unlocked) .viewer { display: none; }
    @media (max-width: 720px) {
      .shell { padding: 12px; }
      .heading { display: grid; }
      .badge { width: fit-content; }
      .fields { grid-template-columns: 1fr; }
      button { width: 100%; }
      .viewer, iframe { min-height: calc(100vh - 24px); }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="gate" aria-label="Craft access gate">
      <div class="heading">
        <div>
          <h1>Pnevma Craft Access</h1>
          <p class="meta">Encrypted static page. The passphrase is not stored in this file.</p>
        </div>
        <span class="badge">56 KB encrypted</span>
      </div>
      <form class="fields" id="unlockForm" autocomplete="on">
        <input id="craft-user" name="username" autocomplete="username" value="craft" hidden>
        <label for="passphrase">Passphrase
          <input id="passphrase" name="current-password" type="password" autocomplete="current-password" required autofocus>
        </label>
        <button class="primary" id="unlock" type="submit">Unlock</button>
        <button class="secondary" id="clear" type="button">Clear</button>
      </form>
      <p class="status" id="status" role="status" aria-live="polite">Enter the Craft access passphrase.</p>
    </section>
    <main class="viewer" id="viewer" aria-label="Craft page preview" hidden>
      <iframe id="preview" title="Pnevma Craft price list" sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-downloads"></iframe>
    </main>
  </div>

    });

    const form = document.getElementById('unlockForm');
    const passphraseInput = document.getElementById('passphrase');
    const unlockButton = document.getElementById('unlock');
    const clearButton = document.getElementById('clear');
    const statusText = document.getElementById('status');
    const viewer = document.getElementById('viewer');
    const preview = document.getElementById('preview');

    function fromBase64(value) {
      const binary = atob(value);
      const bytes = new Uint8Array(binary.length);
      for (let index = 0; index < binary.length; index += 1) bytes[index] = binary.charCodeAt(index);
      return bytes;
    }

    function setStatus(message, type) {
      statusText.textContent = message;
      statusText.className = 'status' + (type ? ' ' + type : '');
    }

    async function deriveKey(passphrase, salt, iterations) {
      const material = await crypto.subtle.importKey('raw', new TextEncoder().encode(passphrase), 'PBKDF2', false, ['deriveKey']);
      return crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt, iterations, hash: 'SHA-256' },
        material,
        { name: 'AES-GCM', length: 256 },
        false,
        ['decrypt']
      );
    }

    async function decryptPage(passphrase) {
      const salt = fromBase64(ENCRYPTED_PAGE.salt);
      const iv = fromBase64(ENCRYPTED_PAGE.iv);
      const ciphertext = fromBase64(ENCRYPTED_PAGE.ciphertext);
      const key = await deriveKey(passphrase, salt, ENCRYPTED_PAGE.iterations);
      const plaintext = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ciphertext);
      return new TextDecoder().decode(plaintext);
    }

    async function unlock() {
      const passphrase = passphraseInput.value;
      if (!passphrase) {
        setStatus('Enter the Craft access passphrase.', 'error');
        passphraseInput.focus();
        return;
      }
      unlockButton.disabled = true;
      setStatus('Decrypting Craft page...', null);
      try {
        const html = await decryptPage(passphrase);
        preview.srcdoc = html;
        viewer.hidden = false;
        document.body.classList.add('is-unlocked');
        setStatus('Unlocked Craft page.', 'ok');
      } catch (error) {
        preview.removeAttribute('srcdoc');
        viewer.hidden = true;
        document.body.classList.remove('is-unlocked');
        setStatus('Unable to unlock. Check the passphrase and try again.', 'error');
      } finally {
        unlockButton.disabled = false;
      }
    }

    form.addEventListener('submit', (event) => {
      event.preventDefault();
      unlock();
    });

    clearButton.addEventListener('click', () => {
      passphraseInput.value = '';
      preview.removeAttribute('srcdoc');
      viewer.hidden = true;
      document.body.classList.remove('is-unlocked');
      setStatus('Cleared. Enter the Craft access passphrase.', null);
      passphraseInput.focus();
    });
  </script>
